name: eeg-biomarker-platform
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - jupyterlab
  - ipykernel
  - pyyaml
  - tqdm
  - pip
  - pip:
    - mne
    - mne-bids
    - pyarrow
    - fastparquet
    - sqlalchemy
    - dash
    - dash-bootstrap-components
    - plotly
    - pytest
    - python-docx
